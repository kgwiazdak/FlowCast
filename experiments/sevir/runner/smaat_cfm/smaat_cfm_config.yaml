# Config for train_smaat_cfm.py (primary CFM experiment) and
# train_smaat_cfm_deterministic.py (diagnostic ablation, same config).
#
# training_params/optimizer_params/scheduler_params/data_params/flow_matching_params/
# ema_model_saving_params/partial_evaluation_params/autoencoder_params/test_params are
# kept identical in value to experiments/sevir/runner/flowcast/flowcast_config.yaml so
# the training budget matches the original FlowCast run exactly -- the backbone
# (smaat_model below) is the only intended difference. See the project plan for the
# research justifying each smaat_model default that deviates from the literal
# official SmaAt-UNet (depth: 4 downsampling stages there vs 2 here, sized for the
# original's 288x288 pixel input rather than this project's 48x48 VAE latent).

smaat_model:
  base_channels: 64    # matches the official SmaAt-UNet's first-layer width
  depth: 3              # 1 stem + 2 downsamples (bottleneck 12x12 on the 48x48 latent)
  time_embed_dim: 128
  cbam_reduction: 16     # matches the official SmaAt-UNet's default
  kernels_per_layer: 2   # matches the official SmaAt-UNet's published default

training_params:
  micro_batch_size: 3
  num_epochs: 200
  num_workers: 12
  early_stopping_patience: 50
  early_stopping_metric: "partial_csi_m"
  grad_accumulation_steps: 1
  gradient_clip_val: 1.0
  fp16: true

optimizer_params:
  learning_rate: 0.0005
  optimizer_type: "adamw"
  weight_decay: 0.0001

scheduler_params:
  scheduler_type: "cosine"
  lr_plateau_factor: 0.2
  lr_plateau_patience: 6
  lr_cosine_warmup_iter_percentage: 0.01
  lr_cosine_min_warmup_lr_ratio: 0.1
  lr_cosine_min_lr_ratio: 0.01

data_params:
  lag_time: 13
  lead_time: 12
  time_spacing: 1

run_params:
  debug_mode: false
  enable_wandb: true
  run_string: "smaat_cfm"
  preload_model: null

flow_matching_params:
  flow_matching_method: "vanilla"
  sigma: 0.01

partial_evaluation_params:
  partial_evaluation: true
  partial_evaluation_interval: 1
  partial_evaluation_batches: 40
  cartopy_features: false

autoencoder_params:
  autoencoder_checkpoint: "saved_models/sevir/autoencoder/models/early_stopping_model.pt"
  normalized_autoencoder: true
  latent_channels: 4
  norm_num_groups: 32
  layers_per_block: 2
  act_fn: "silu"
  block_out_channels: [128, 256, 512, 512]
  down_block_types:
    - "DownEncoderBlock2D"
    - "DownEncoderBlock2D"
    - "DownEncoderBlock2D"
    - "DownEncoderBlock2D"
  up_block_types:
    - "UpDecoderBlock2D"
    - "UpDecoderBlock2D"
    - "UpDecoderBlock2D"
    - "UpDecoderBlock2D"

ema_model_saving_params:
  ema_model_saving: true
  ema_model_saving_decay: 0.999

test_params:
  micro_batch_size: 6
  num_workers: 12
  probabilistic_samples: 8
  batch_size_autoencoder: 12
  euler_steps: 10
  cartopy_features: false
